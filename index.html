<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopMate — Store Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🛒</div>
      <span class="brand-name">ShopMate</span>
    </div>
    <div class="topbar-right">
      <span class="time-display" id="clockDisplay">--:--</span>
    </div>
  </header>

  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('sell')" id="tab-sell">
      <span class="tab-icon">🧾</span> Sell
    </button>
    <button class="nav-tab" onclick="switchTab('inventory')" id="tab-inventory">
      <span class="tab-icon">📦</span> Inventory <span id="lowStockDot" style="display:none" class="notif-dot"></span>
    </button>
    <button class="nav-tab" onclick="switchTab('analytics')" id="tab-analytics">
      <span class="tab-icon">📊</span> Analytics
    </button>
    <button class="nav-tab" onclick="switchTab('settings')" id="tab-settings">
      <span class="tab-icon">⚙️</span> Settings
    </button>
  </nav>

  <main class="main">
    <div class="page active" id="page-sell">
      <div class="section-header">
        <div>
          <div class="section-title">New Sale</div>
          <div class="section-subtitle">Search and add items to the order</div>
        </div>
      </div>
      <div id="sellLowStockBanner" style="display:none"></div>
      <div class="sell-layout">
        <div>
          <div class="search-wrapper" style="position:relative">
            <span class="search-icon">🔍</span>
            <input type="text" id="sellSearch" placeholder="Search item by name or UID…" autocomplete="off" oninput="onSellSearch(this.value)" onkeydown="onSellSearchKey(event)">
            <div class="search-results" id="sellSearchResults" style="display:none"></div>
          </div>
          <div class="sell-items-header">
            <span>Order Items</span>
            <button class="btn btn-outline btn-sm" onclick="clearCart()">Clear all</button>
          </div>
          <div class="cart-list" id="cartList">
            <div class="empty-cart" id="cartEmpty">
              <div class="empty-icon">🛍️</div>
              <p>No items added yet.<br>Search above to add items.</p>
            </div>
          </div>
        </div>
        <div class="order-summary">
          <div class="card">
            <div class="card-title">Order Summary</div>
            <div id="summaryRows">
              <div class="summary-row"><span class="summary-label">Items</span><span id="summaryItems">0</span></div>
              <div class="summary-row"><span class="summary-label">Subtotal</span><span id="summarySubtotal">—</span></div>
              <div class="summary-row" style="padding-top:12px">
                <span style="font-weight:700">Total</span>
                <span class="summary-total" id="summaryTotal">—</span>
              </div>
            </div>
            <button class="confirm-btn" id="confirmSaleBtn" onclick="confirmSale()" disabled>Confirm Sale ✓</button>
          </div>
          <div class="card" style="margin-top:16px">
            <div class="card-title" style="font-size:14px;margin-bottom:10px">Recent Sales</div>
            <div id="recentSalesList" style="font-size:13px;color:var(--text-muted)">No sales yet today.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-inventory">
      <div class="section-header">
        <div>
          <div class="section-title">Inventory</div>
          <div class="section-subtitle">Manage your stock</div>
        </div>
      </div>
      <div id="invLowBanner" style="display:none"></div>
      <div class="inv-toolbar">
        <div class="inv-search">
          <span class="search-icon" style="left:11px;top:50%;transform:translateY(-50%);position:absolute;color:var(--text-muted)">🔍</span>
          <input type="text" placeholder="Search inventory…" style="padding-left:36px" oninput="renderInventory(this.value)" id="invSearchInput">
        </div>
        <div class="view-toggle">
          <button class="vt-btn active" id="viewGrid" onclick="setView('grid')" title="Grid view">⊞</button>
          <button class="vt-btn" id="viewList" onclick="setView('list')" title="List view">☰</button>
        </div>
      </div>
      <div id="inventoryContainer"></div>
    </div>
    
    </main>
</div>

<div class="toast-container" id="toastContainer"></div>
<button class="btn-fab" id="fabAdd" style="display:none" onclick="openAddItem()" title="Add item">+</button>

<script src="assets/js/database.js"></script>
<script src="assets/js/inventory.js"></script>
<script src="assets/js/sales.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
